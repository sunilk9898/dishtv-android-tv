name: Build & Release APK

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:  # Manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Read version
        id: version
        run: |
          source version.properties
          echo "version=${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_PATCH}" >> $GITHUB_OUTPUT
          echo "build=${VERSION_BUILD}" >> $GITHUB_OUTPUT
          echo "full=v${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_PATCH}-build${VERSION_BUILD}" >> $GITHUB_OUTPUT

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ─── Debug APK ─────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # ─── Release APK (signed) ──────────────────────────
      - name: Decode Keystore
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore/dishtv-release.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build Release APK
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # ─── Upload Artifacts ──────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ steps.version.outputs.full }}
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ steps.version.outputs.full }}
          path: app/build/outputs/apk/release/*.apk

      # ─── Upload to AWS S3 ─────────────────────────────
      - name: Upload to S3
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        run: |
          # Install AWS CLI
          pip install awscli

          # Upload debug APK
          aws s3 cp app/build/outputs/apk/debug/*.apk \
            s3://${{ secrets.S3_BUCKET }}/apk/debug/DishTV-CommandCenter-debug-latest.apk \
            --acl public-read

          # Upload release APK
          aws s3 cp app/build/outputs/apk/release/*.apk \
            s3://${{ secrets.S3_BUCKET }}/apk/release/DishTV-CommandCenter-release-latest.apk \
            --acl public-read

          # Upload versioned copies
          aws s3 cp app/build/outputs/apk/debug/*.apk \
            "s3://${{ secrets.S3_BUCKET }}/apk/debug/DishTV-CommandCenter-${{ steps.version.outputs.full }}-debug.apk" \
            --acl public-read

          aws s3 cp app/build/outputs/apk/release/*.apk \
            "s3://${{ secrets.S3_BUCKET }}/apk/release/DishTV-CommandCenter-${{ steps.version.outputs.full }}-release.apk" \
            --acl public-read

          echo "✅ APKs uploaded to S3"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1

      # ─── Auto-increment build number ───────────────────
      - name: Increment build number
        if: github.ref == 'refs/heads/main'
        run: |
          source version.properties
          NEW_BUILD=$((VERSION_BUILD + 1))
          cat > version.properties << EOF
          VERSION_MAJOR=$VERSION_MAJOR
          VERSION_MINOR=$VERSION_MINOR
          VERSION_PATCH=$VERSION_PATCH
          VERSION_BUILD=$NEW_BUILD
          EOF

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add version.properties
          git commit -m "Auto-increment build to $NEW_BUILD [skip ci]"
          git push

      # ─── Create GitHub Release (on tags) ───────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          generate_release_notes: true
